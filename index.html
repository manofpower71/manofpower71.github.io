<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal website.">
    <title>makajam - Home</title>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  </head>
  <body>
    <div class="icon" >
      <img id="homuhomu" src="/assets/homu.png" onmouseover="this.src='/assets/homu2.png'" onmouseout="this.src='/assets/homu.png'" alt="homu">
    </div>

    <script>
      const img = document.getElementById("homuhomu");
      
      let interval;
      let toggle = false;
      
      img.addEventListener("mouseenter", () => {
      interval = setInterval(() => {
      img.style.cursor = toggle ? "grab" : "grabbing";
      toggle = !toggle;
      }, 200);
      });
      
      img.addEventListener("mouseleave", () => {
      clearInterval(interval);
      img.style.cursor = "default";
      });
    </script>

    <h1 class="outline text">Homepage</h1>
    <p>I might add more stuff to this site in the future.
    <a href="https://makajam.org/art/">
    <p>[Art]</a> Drawings of questionable quality.</p>

    <form action="https://api.web3forms.com/submit" method="POST">
      <div class="h-captcha"
      data-captcha="true"
      data-lang="en"
      data-size="compact"
      ></div>
      <input type="hidden" name="access_key" value="b9469482-6733-4b29-bca0-d806f89d7145">
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <textarea name="message" placeholder="Message" required></textarea>
      <button type="submit">Submit Form</button>
    </form>

    <script src="https://web3forms.com/client/script.js" async defer></script>

  <script>
  const form = document.getElementById('b9469482-6733-4b29-bca0-d806f89d7145');

  form.addEventListener('submit', function(e) {

      const hCaptcha = form.querySelector('textarea[name=h-captcha-response]').value;

      if (!hCaptcha) {
          e.preventDefault();
          alert("Please fill out captcha field")
          return
      }
  });
  </script>

  </body>
</html>
